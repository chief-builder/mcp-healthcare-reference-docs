<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" role="img" aria-label="Governed egress: a tool call is DLP-screened at the internal gateway, the broker resolves a vendor token from OpenBao custody with single-flight refresh, and only the vendor token crosses to the SaaS vendor.">
  <defs>
    <marker id="ar4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#B5A08A"/>
    </marker>
    <marker id="ag4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#D29A5B"/>
    </marker>
  </defs>
  <rect width="1600" height="700" fill="#1F1811"/>

  <!-- tool call -->
  <rect x="46" y="120" width="310" height="110" rx="12" fill="#241B12" stroke="#4A3826" stroke-width="1.5"/>
  <text x="66" y="160" fill="#EFE5D6" font-size="23" font-weight="650">tools/call: create_issue</text>
  <text x="66" y="192" fill="#B5A08A" font-size="18">carries the hub JWT</text>
  <text x="66" y="218" fill="#B5A08A" font-size="18">(vendor never sees it)</text>

  <!-- internal DP with plugins -->
  <rect x="440" y="70" width="380" height="300" rx="16" fill="#241B12" stroke="#D29A5B" stroke-width="2"/>
  <text x="460" y="112" fill="#EFE5D6" font-size="25" font-weight="700">Kong internal DP</text>
  <rect x="460" y="136" width="340" height="96" rx="10" fill="#2A2013" stroke="#77603A"/>
  <text x="478" y="172" fill="#EFE5D6" font-size="21" font-weight="650">dlp-egress</text>
  <text x="478" y="202" fill="#B5A08A" font-size="17">scans raw body for MRN/SSN · fails closed</text>
  <rect x="460" y="248" width="340" height="96" rx="10" fill="#2A2013" stroke="#77603A"/>
  <text x="478" y="284" fill="#EFE5D6" font-size="21" font-weight="650">vendor-token</text>
  <text x="478" y="314" fill="#B5A08A" font-size="17">asks the broker · swaps Authorization</text>

  <path d="M356 175 L440 175" fill="none" stroke="#B5A08A" stroke-width="2" marker-end="url(#ar4)"/>

  <!-- deny branch -->
  <rect x="440" y="440" width="380" height="110" rx="12" fill="#241B12" stroke="#7A4038" stroke-width="1.5"/>
  <text x="460" y="480" fill="#E8938C" font-size="20" font-weight="700">✗ planted MRN → blocked at the gateway</text>
  <text x="460" y="512" fill="#B5A08A" font-size="17">verdict audited by pattern name — never the value;</text>
  <text x="460" y="536" fill="#B5A08A" font-size="17">clean passes are audited too</text>
  <path d="M630 370 L630 440" fill="none" stroke="#7A4038" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#ar4)"/>

  <!-- broker + vault -->
  <rect x="920" y="100" width="360" height="180" rx="14" fill="#2A2013" stroke="#D29A5B" stroke-width="2"/>
  <text x="940" y="142" fill="#EFE5D6" font-size="25" font-weight="700">Vendor Token Broker</text>
  <text x="940" y="174" fill="#B5A08A" font-size="18">re-validates the hub JWT itself</text>
  <text x="940" y="202" fill="#B5A08A" font-size="18">single-flight refresh · CAS-guarded writes</text>
  <text x="940" y="230" fill="#B5A08A" font-size="18">first use → browser consent (PKCE)</text>
  <text x="940" y="262" fill="#E0A45C" font-size="17" font-weight="650">custodian, not issuer — mints nothing</text>

  <rect x="980" y="340" width="240" height="96" rx="12" fill="#241B12" stroke="#4A3826" stroke-width="1.5"/>
  <text x="1000" y="378" fill="#EFE5D6" font-size="22" font-weight="650">OpenBao vault</text>
  <text x="1000" y="408" fill="#B5A08A" font-size="17">per-user vendor grants</text>
  <path d="M1100 280 L1100 340" fill="none" stroke="#B5A08A" stroke-width="2" marker-end="url(#ar4)"/>

  <path d="M820 300 C 870 300 880 220 920 205" fill="none" stroke="#B5A08A" stroke-width="2" marker-end="url(#ar4)"/>
  <text x="836" y="252" fill="#B5A08A" font-size="17">resolve</text>

  <!-- vendor -->
  <rect x="1360" y="120" width="200" height="140" rx="14" fill="#241B12" stroke="#4A3826" stroke-width="1.5"/>
  <text x="1380" y="162" fill="#EFE5D6" font-size="23" font-weight="700">Vendor</text>
  <text x="1380" y="192" fill="#B5A08A" font-size="17">mockhub · GitHub</text>
  <text x="1380" y="224" fill="#A3BE78" font-size="17" font-weight="650">✓ vendor token only</text>

  <path d="M1280 175 L1360 175" fill="none" stroke="#D29A5B" stroke-width="2.5" marker-end="url(#ag4)"/>
  <text x="1284" y="156" fill="#D29A5B" font-size="16" font-weight="650">token swap</text>

  <!-- boundary note -->
  <line x1="1330" y1="70" x2="1330" y2="560" stroke="#77603A" stroke-dasharray="4 8"/>
  <text x="1330" y="600" fill="#ECC894" font-size="18" text-anchor="middle" font-weight="650">the boundary</text>
  <text x="1280" y="628" fill="#ECC894" font-size="17" text-anchor="middle">hub JWT never crosses · 20 parallel calls → one vendor refresh</text>
</svg>
